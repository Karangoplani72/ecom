name: ecom
description: A multi-vendor marketplace app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  fpdart: ^1.2.0
  json_annotation: ^4.12.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  firebase_storage: ^13.4.2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  http: ^1.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.5
  flutter_svg: ^2.3.0
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.3
  connectivity_plus: ^7.1.1
  razorpay_flutter: ^1.4.5
  web: ^1.1.1
  dio: ^5.9.2
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  firebase_app_check: ^0.4.5
  flutter_dotenv: ^6.0.1
  file_picker: ^11.0.2
  csv: ^8.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/images/3d/
    - assets/images/categories/
    - assets/lottie/
    - .env.dev
    - .env.prod
